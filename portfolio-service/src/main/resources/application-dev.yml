server:
  port: 8083
spring:
  application:
    name: portfolio-service
  datasource:
    url: jdbc:postgresql://localhost:5434/portfoliodb
    username: portfolio
    password: portfolio
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/trading-platform
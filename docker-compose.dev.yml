services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.6.3
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
    ports: ["8080:8080"]
    depends_on: [keycloak-db]
    volumes:
      -  ./auth:/opt/keycloak/data/import

  keycloak-db:
    image: postgres:16
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    volumes: [keycloak_data:/var/lib/postgresql/data]

  market-db:
    image: postgres:16
    environment:
      POSTGRES_DB: marketdb
      POSTGRES_USER: market
      POSTGRES_PASSWORD: market
    ports:
        - "5433:5432"
    volumes: [ market_data:/var/lib/postgresql/data ]


  asset-db:
    image: postgres:16
    environment:
      POSTGRES_DB: assetdb
      POSTGRES_USER: asset
      POSTGRES_PASSWORD: asset
    ports:
      - "5432:5432"
    volumes: [ asset_data:/var/lib/postgresql/data ]

  portfolio-db:
    image: postgres:16
    environment:
      POSTGRES_DB: portfoliodb
      POSTGRES_USER: portfolio
      POSTGRES_PASSWORD: portfolio
    volumes: [ portfolio_data:/var/lib/postgresql/data ]

  notifications-db:
    image: postgres:16
    environment:
      POSTGRES_DB: notificationsdb
      POSTGRES_USER: notifications
      POSTGRES_PASSWORD: notifications
    volumes: [ notifications_data:/var/lib/postgresql/data ]

volumes:
  keycloak_data:
  market_data:
  asset_data:
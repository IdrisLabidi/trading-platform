server:
  port: 8082
spring:
  application:
    name: asset-service
  datasource:
    url: jdbc:postgresql://asset-db:5432/assetdb
    username: asset
    password: asset
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

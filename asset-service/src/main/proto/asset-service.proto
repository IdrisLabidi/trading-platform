syntax = "proto3";

option java_multiple_files = true;
option java_package = "tn.utm.nainternship.assetservice";
option java_outer_classname = "AssetServiceProto";

service AssetService {
  rpc getAsset(AssetRequest) returns (AssetResponse) {}
}

message AssetRequest {
  string symbol = 1;
}

message AssetResponse {
  string symbol = 1;
  string name = 2;
  double price = 3;
  string id = 4;
  string description = 5;
  string type = 6;
  string market = 7;
  string currency = 8;
  double lastPrice = 9;
  bool isActive = 10;
  int64 listedAt = 11;
}